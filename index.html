<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>簡易佈告欄系統</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f3f4f6;
      --text: #1f2937;
      --muted: #6b7280;
      --card-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top, #ffffff 0%, #eef2f7 45%, #e7ecf3 100%);
      color: var(--text);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .page-header h1 {
      margin: 0 0 8px;
      font-size: 34px;
      letter-spacing: 1px;
    }

    .page-header p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .board-shell {
      position: relative;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.16);
      overflow: hidden;
    }

    .board-topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
    }

    .board-heading {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .board-heading h2 {
      margin: 0;
      font-size: 32px;
    }

    .board-subtitle {
      font-size: 14px;
      opacity: 0.85;
    }

    .board-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .theme-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      backdrop-filter: blur(6px);
    }

    .theme-switcher label {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .theme-switcher select {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    .toggle-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .toggle-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .composer-wrap {
      margin-bottom: 22px;
      position: relative;
      z-index: 2;
    }

    .composer-panel {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-8px);
      transition: max-height 0.35s ease, opacity 0.25s ease, transform 0.25s ease, padding 0.25s ease;
      padding: 0 18px;
      border-radius: 18px;
    }

    .composer-panel.open {
      max-height: 520px;
      opacity: 1;
      transform: translateY(0);
      padding: 18px;
    }

    .composer-grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 14px;
    }

    .composer-main {
      display: grid;
      gap: 12px;
    }

    .composer-side {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 15px;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.92);
      outline: none;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: rgba(37, 99, 235, 0.45);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .field textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.6;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .publish-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .publish-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .sections {
      position: relative;
      z-index: 2;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin: 22px 0 14px;
    }

    .latest-area,
    .history-area {
      display: grid;
      gap: 16px;
    }

    .latest-card,
    .history-card {
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--card-shadow);
      position: relative;
      word-break: break-word;
    }

    .latest-card h3,
    .history-card h3 {
      margin: 0 0 10px;
      line-height: 1.35;
    }

    .latest-card h3 {
      font-size: 24px;
    }

    .history-card h3 {
      font-size: 18px;
    }

    .card-content {
      line-height: 1.8;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .meta {
      margin-top: 14px;
      font-size: 13px;
      opacity: 0.82;
    }

    .history-area {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .empty {
      padding: 18px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.6;
    }

    .pin {
      position: absolute;
      font-size: 24px;
      top: -10px;
      right: 18px;
    }

    /* 辦公室 */
    .theme-office {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.05)),
        linear-gradient(135deg, #dbeafe, #eff6ff 45%, #dbeafe 100%);
      border: 6px solid #93c5fd;
    }

    .theme-office .theme-switcher {
      background: rgba(255,255,255,0.72);
      color: #1e3a8a;
    }

    .theme-office .theme-switcher select {
      background: #ffffff;
      color: #1e3a8a;
    }

    .theme-office .toggle-btn,
    .theme-office .publish-btn {
      background: #2563eb;
      color: #fff;
    }

    .theme-office .composer-panel {
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(37, 99, 235, 0.16);
    }

    .theme-office .latest-card,
    .theme-office .history-card {
      background: #ffffff;
      border-left: 8px solid #2563eb;
    }

    .theme-office .empty {
      background: rgba(255,255,255,0.8);
    }

    /* 教室 */
    .theme-classroom {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0)),
        linear-gradient(180deg, #2f5d3a 0%, #2d6a3d 45%, #285d36 100%);
      border: 12px solid #8b5a2b;
      color: #fef6d8;
    }

    .theme-classroom .theme-switcher {
      background: rgba(255,248,220,0.12);
      color: #fff6d5;
    }

    .theme-classroom .theme-switcher select {
      background: #fff6d5;
      color: #4b2f16;
    }

    .theme-classroom .toggle-btn,
    .theme-classroom .publish-btn {
      background: #f59e0b;
      color: #3b240b;
    }

    .theme-classroom .composer-panel {
      background: rgba(255, 248, 220, 0.12);
      border: 1px solid rgba(255, 248, 220, 0.18);
    }

    .theme-classroom .field input,
    .theme-classroom .field textarea {
      background: rgba(255, 250, 237, 0.96);
      color: #2d2d2d;
    }

    .theme-classroom .hint {
      color: rgba(255, 246, 213, 0.85);
    }

    .theme-classroom .latest-card,
    .theme-classroom .history-card {
      background: #fff6d9;
      color: #2c2419;
      border: 2px dashed #8b5a2b;
    }

    .theme-classroom .empty {
      background: rgba(255, 246, 217, 0.92);
      color: #2c2419;
    }

    /* 冰箱 */
    .theme-fridge {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.08)),
        linear-gradient(180deg, #edf8ff 0%, #dfeef7 52%, #d5e7f0 100%);
      border: 6px solid #b6cad6;
    }

    .theme-fridge .theme-switcher {
      background: rgba(255,255,255,0.65);
      color: #31556a;
    }

    .theme-fridge .theme-switcher select {
      background: #ffffff;
      color: #31556a;
    }

    .theme-fridge .toggle-btn,
    .theme-fridge .publish-btn {
      background: #3b82f6;
      color: white;
    }

    .theme-fridge .composer-panel {
      background: rgba(255,255,255,0.64);
      border: 1px solid rgba(49, 85, 106, 0.12);
    }

    .theme-fridge .latest-card,
    .theme-fridge .history-card {
      background: #fffdf7;
      border: 1px solid #d7dce0;
    }

    .theme-fridge .empty {
      background: rgba(255,255,255,0.78);
    }

    @media (max-width: 820px) {
      .board-topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .board-actions {
        justify-content: space-between;
      }

      .composer-grid {
        grid-template-columns: 1fr;
      }

      .history-area {
        grid-template-columns: 1fr;
      }

      .page-header h1 {
        font-size: 28px;
      }

      .board-heading h2 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1>簡易佈告欄系統</h1>
      <p>主畫面先看公告，新增功能收合在上方，較符合實際使用情境</p>
    </div>

    <section id="boardShell" class="board-shell theme-office">
      <div class="board-topbar">
        <div class="board-heading">
          <h2 id="boardTitle">📋 辦公室佈告欄</h2>
          <div class="board-subtitle">最新公告會固定顯示在最上方，方便快速查看</div>
        </div>

        <div class="board-actions">
          <button id="toggleComposerBtn" class="toggle-btn" type="button">＋ 張貼公告</button>

          <div class="theme-switcher">
            <label for="themeSelect">風格</label>
            <select id="themeSelect">
              <option value="office">辦公室</option>
              <option value="classroom">教室</option>
              <option value="fridge">冰箱</option>
            </select>
          </div>
        </div>
      </div>

      <div class="composer-wrap">
        <div id="composerPanel" class="composer-panel">
          <div class="composer-grid">
            <div class="composer-main">
              <div class="field">
                <label for="titleInput">文字</label>
                <input id="titleInput" type="text" placeholder="例如：停車場施工通知" />
              </div>

              <div class="field">
                <label for="messageInput">訊息</label>
                <textarea id="messageInput" placeholder="請輸入公告內容"></textarea>
              </div>
            </div>

            <div class="composer-side">
              <div class="field">
                <label for="authorInput">發布人</label>
                <input id="authorInput" type="text" placeholder="例如：總務組" />
              </div>

              <button id="publishBtn" class="publish-btn" type="button">發布公告</button>

              <div class="hint">
                建議先填標題，再補內容。<br>
                發布後會自動成為最新公告。
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="sections">
        <div class="section-title">最新公告</div>
        <div id="latestArea" class="latest-area"></div>

        <div class="section-title">歷史訊息</div>
        <div id="historyArea" class="history-area"></div>
      </div>
    </section>
  </div>

  <script>
    const themeSelect = document.getElementById("themeSelect");
    const boardShell = document.getElementById("boardShell");
    const boardTitle = document.getElementById("boardTitle");

    const toggleComposerBtn = document.getElementById("toggleComposerBtn");
    const composerPanel = document.getElementById("composerPanel");

    const titleInput = document.getElementById("titleInput");
    const messageInput = document.getElementById("messageInput");
    const authorInput = document.getElementById("authorInput");
    const publishBtn = document.getElementById("publishBtn");

    const latestArea = document.getElementById("latestArea");
    const historyArea = document.getElementById("historyArea");

    let composerOpen = false;

    const themeMap = {
      office: {
        className: "theme-office",
        title: "📋 辦公室佈告欄"
      },
      classroom: {
        className: "theme-classroom",
        title: "🧑‍🏫 教室佈告欄"
      },
      fridge: {
        className: "theme-fridge",
        title: "🧊 冰箱佈告欄"
      }
    };

    const posts = [
      {
        title: "歡迎使用佈告欄",
        message: "這是一個示範公告。你可以點右上角切換不同風格，也可以點「張貼公告」新增訊息。",
        author: "系統管理員",
        time: new Date().toLocaleString("zh-TW")
      },
      {
        title: "影印機維護通知",
        message: "本週五下午 3 點到 5 點，影印機將進行保養，請提早完成文件列印。",
        author: "行政組",
        time: "2026/4/18 下午 03:20:00"
      },
      {
        title: "茶水間清潔提醒",
        message: "請於離開前帶走個人物品，並保持流理台整潔。",
        author: "總務組",
        time: "2026/4/16 上午 10:00:00"
      }
    ];

    function escapeHTML(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function applyTheme(theme) {
      boardShell.className = "board-shell " + themeMap[theme].className;
      boardTitle.textContent = themeMap[theme].title;
    }

    function setComposer(open) {
      composerOpen = open;
      composerPanel.classList.toggle("open", open);
      toggleComposerBtn.textContent = open ? "收合張貼區" : "＋ 張貼公告";
    }

    function createCardHTML(post, isLatest = false) {
      return `
        <article class="${isLatest ? "latest-card" : "history-card"}">
          <div class="pin">📌</div>
          <h3>${escapeHTML(post.title)}</h3>
          <div class="card-content">${escapeHTML(post.message)}</div>
          <div class="meta">發布人：${escapeHTML(post.author)} ｜ 發布時間：${escapeHTML(post.time)}</div>
        </article>
      `;
    }

    function renderBoard() {
      if (posts.length === 0) {
        latestArea.innerHTML = '<div class="empty">目前沒有公告。</div>';
        historyArea.innerHTML = '<div class="empty">目前沒有歷史訊息。</div>';
        return;
      }

      latestArea.innerHTML = createCardHTML(posts[0], true);

      if (posts.length === 1) {
        historyArea.innerHTML = '<div class="empty">目前沒有歷史訊息。</div>';
      } else {
        historyArea.innerHTML = posts
          .slice(1)
          .map(post => createCardHTML(post, false))
          .join("");
      }
    }

    function publishPost() {
      const title = titleInput.value.trim();
      const message = messageInput.value.trim();
      const author = authorInput.value.trim();

      if (!title || !message || !author) {
        alert("請把文字、訊息、發布人都填寫完整。");
        return;
      }

      posts.unshift({
        title,
        message,
        author,
        time: new Date().toLocaleString("zh-TW")
      });

      titleInput.value = "";
      messageInput.value = "";
      authorInput.value = "";

      renderBoard();
      setComposer(false);
    }

    toggleComposerBtn.addEventListener("click", () => {
      setComposer(!composerOpen);
    });

    publishBtn.addEventListener("click", publishPost);

    themeSelect.addEventListener("change", (e) => {
      applyTheme(e.target.value);
    });

    applyTheme("office");
    setComposer(false);
    renderBoard();
  </script>
</body>
</html>
